<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>Baha - 匿名文字論壇</title>
    <meta name="google-site-verification" content="UGVmNHRyD3v4aQyhDANDEmC4_LVKDZtB_SA2mZSJ1hg" />
    <meta name="description" content="Baha 是一個輕量、即時的匿名文字聊天論壇。免註冊、免登入，建立專屬話題房間，享受純粹的交流與互動體驗。">
    <meta name="keywords" content="Baha, 匿名聊天, 文字論壇, 聊天室, 免費聊天, 即時通訊, 匿名交友">
    <meta name="author" content="Baha">
    <meta name="theme-color" content="#333333">
    <link rel="icon" href="/icon/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon/icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chat/chat-room.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
</head>
<body>
    <!-- 載入與斷線等候畫面 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2 data-i18n="connecting">連線中...</h2>
        <p data-i18n="waking_up">若伺服器正在從休眠中喚醒，可能需要等待約 30~50 秒，請稍候 ☕</p>
    </div>

    <div id="app-version-badge" class="app-version-badge hidden" aria-live="polite">
        <span class="app-version-badge__label">Version</span>
        <strong id="app-version-text">--</strong>
    </div>

    <!-- 大廳畫面：用來顯示話題列表與建立話題 -->
    <div id="lobby-view" class="chat-container hidden">
        <header class="lobby-header">
            <div style="width: 60px; visibility: hidden;"></div> <!-- 佔位平衡 -->
            <h1 data-i18n="lobby_title">Baha 話題大廳</h1>
            <button id="features-btn" class="header-btn">
                <span data-i18n="features">功能</span>
                <span id="features-dot" class="notification-dot hidden"></span>
            </button>
        </header>
        
        <div id="lobby-grid">
            <div class="lobby-main">
                <div id="room-form-container">
                    <input id="room-input" autocomplete="off" placeholder="建立新房間..." data-i18n-placeholder="new_topic_placeholder" required />
                    <button id="create-room-btn" data-i18n="create">建立</button>
                </div>
                <div id="search-container">
                    <input id="search-input" autocomplete="off" placeholder="🔍 搜尋話題..." data-i18n-placeholder="search_placeholder" />
                </div>
                <ul id="room-list"></ul>
            </div>
            <aside class="lobby-side side-panel" data-panel-id="lobby">
                <div class="side-panel-header">
                    <div>
                        <h2>桌機專區</h2>
                        <p>拖曳視窗可以讓左側房間與右側彈性工具同時呈現，維持清爽的 16:9 觀看體驗。</p>
                    </div>
                    <button class="side-panel-add-btn" type="button">+ 新增卡片</button>
                </div>
                <div class="side-card-list"></div>
                <form class="side-panel-form hidden" data-panel-id="lobby">
                    <input name="title" placeholder="卡片標題" required />
                    <textarea name="content" rows="3" placeholder="卡片內容 / 支援 Markdown 語法" required></textarea>
                    <div class="side-panel-form-actions">
                        <button type="submit">新增</button>
                        <button type="button" class="side-panel-form-cancel">取消</button>
                    </div>
                </form>
            </aside>
        </div>
    </div>

    <!-- 大白板（全螢幕主畫面，作為 body 直接子元素以避免 display:none 繼承問題） -->
    <div id="desktop-board" class="desktop-board" aria-label="大白板">
        <header class="desktop-board-header">
            <div>
                <h2>桌機白板</h2>
                <p>Baha-chat</p>
            </div>
            <div class="desktop-board-actions">
                <button id="board-open-palette-btn" type="button">新增組件</button>
                <button id="board-reset-btn" type="button">重置佈局</button>
                <button id="board-features-btn" type="button" class="board-features-btn" data-i18n="features">功能</button>
            </div>
        </header>
        <div id="board-palette" class="board-palette hidden">
            <p>選擇要新增的組件</p>
            <div class="board-palette-buttons">
                <button type="button" data-board-module="create-room">建立房間</button>
                <button type="button" data-board-module="search">搜尋話題</button>
                <button type="button" data-board-module="rooms">房間列表</button>
                <button type="button" data-board-module="actions">功能捷徑</button>
                <button type="button" data-board-module="sponsor">贊助資訊</button>
            </div>
            <form id="board-custom-component-form">
                <input name="title" placeholder="卡片標題" required />
                <textarea name="content" rows="3" placeholder="卡片內容 / 支援 Markdown 語法" required></textarea>
                <button type="submit">建立自訂卡片</button>
            </form>
        </div>
        <div class="board-surface">
            <div id="board-canvas" class="board-canvas"></div>
        </div>
    </div>

    <div id="chat-room-mount"></div>

    <!-- 引入 Socket.io 客戶端套件 -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="i18n.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-anchor/dist/markdown-it-anchor.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-emoji/dist/markdown-it-emoji.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-abbr/dist/markdown-it-abbr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote/dist/markdown-it-footnote.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists/dist/markdown-it-task-lists.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-container/dist/markdown-it-container.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-mark/dist/markdown-it-mark.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-ins/dist/markdown-it-ins.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-video/dist/markdown-it-video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-sub/dist/markdown-it-sub.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-sup/dist/markdown-it-sup.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-multimd-table/dist/markdown-it-multimd-table.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it-highlightjs/dist/markdown-it-highlightjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
    <script src="js/clipboard.js"></script>
    <script src="js/admin-key-banner.js"></script>
    <script src="js/thread-ui.js"></script>
    <script>
        (function () {
            const mount = document.getElementById('chat-room-mount');
            if (!mount) return;
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'chat/chat-fragment.html', false);
            xhr.send(null);
            if (xhr.status >= 200 && xhr.status < 300) {
                mount.outerHTML = xhr.responseText;
            } else {
                mount.innerHTML = '<div class="chat-container hidden">聊天室載入失敗</div>';
            }
        }());
    </script>
    <script src="script.js"></script>
    <script src="chat/chat-room.js"></script>
    <script src="js/sw-update.js"></script>
    
</body>
</html>
