<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baha - 匿名文字論壇</title>
    <meta name="google-site-verification" content="UGVmNHRyD3v4aQyhDANDEmC4_LVKDZtB_SA2mZSJ1hg" />
    <meta name="description" content="Baha 是一個輕量、即時的匿名文字聊天論壇。免註冊、免登入，建立專屬話題房間，享受純粹的交流與互動體驗。">
    <meta name="keywords" content="Baha, 匿名聊天, 文字論壇, 聊天室, 免費聊天, 即時通訊, 匿名交友">
    <meta name="author" content="Baha">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 載入與斷線等候畫面 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2 data-i18n="connecting">連線中...</h2>
        <p data-i18n="waking_up">若伺服器正在從休眠中喚醒，可能需要等待約 30~50 秒，請稍候 ☕</p>
    </div>

    <!-- 大廳畫面：用來顯示話題列表與建立話題 -->
    <div id="lobby-view" class="chat-container">
        <header>
            <h1 data-i18n="lobby_title">Baha 話題大廳</h1>
        </header>
        
        <div id="room-form-container">
            <input id="room-input" autocomplete="off" placeholder="發起新話題..." data-i18n-placeholder="new_topic_placeholder" required />
            <button id="create-room-btn" data-i18n="create">建立</button>
        </div>
        <div id="search-container">
            <input id="search-input" autocomplete="off" placeholder="🔍 搜尋話題..." data-i18n-placeholder="search_placeholder" />
        </div>
        <ul id="room-list"></ul>
    </div>

    <!-- 聊天室畫面：進入特定話題後顯示，預設隱藏 -->
    <div id="chat-view" class="chat-container hidden">
        <header class="chat-header">
            <button id="back-btn" data-i18n="back_to_lobby">⬅ 返回大廳</button>
            <h1 id="room-title" data-i18n="room_title_default">話題標題</h1>
        </header>
        
        <div id="danmaku-container"></div>
        <ul id="messages"></ul>
        
        <!-- 準備回覆的預覽區塊 (預設隱藏) -->
        <div id="reply-preview" class="hidden">
            <div class="reply-content">
                <span data-i18n="reply_to_prefix">↩️ 回覆</span> <span id="reply-preview-user"></span>：<span id="reply-preview-text"></span>
            </div>
            <button id="cancel-reply-btn" type="button">✖</button>
        </div>

        <form id="form" action="">
            <textarea id="input" autocomplete="off" placeholder="輸入匿名訊息..." data-i18n-placeholder="chat_placeholder" required></textarea>
            <button type="submit" data-i18n="send">發送</button>
        </form>
    </div>

    <!-- 訊息右鍵/長按互動選單 -->
    <div id="message-context-menu" class="hidden">
        <div class="menu-item" id="menu-reply" data-i18n="menu_reply">↩️ 回覆訊息</div>
        <div class="menu-item" id="menu-copy" data-i18n="menu_copy">📋 複製文字</div>
    </div>

    <!-- 引入 Socket.io 客戶端套件 -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
</body>
</html>
