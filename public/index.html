<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baha - 匿名文字論壇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 大廳畫面：用來顯示話題列表與建立話題 -->
    <div id="lobby-view" class="chat-container">
        <header>
            <h1>Baha 話題大廳</h1>
        </header>
        
        <div id="room-form-container">
            <input id="room-input" autocomplete="off" placeholder="發起新話題..." required />
            <button id="create-room-btn">建立</button>
        </div>
        <div id="search-container">
            <input id="search-input" autocomplete="off" placeholder="🔍 搜尋話題..." />
        </div>
        <ul id="room-list"></ul>
    </div>

    <!-- 聊天室畫面：進入特定話題後顯示，預設隱藏 -->
    <div id="chat-view" class="chat-container hidden">
        <header class="chat-header">
            <button id="back-btn">⬅ 返回大廳</button>
            <h1 id="room-title">話題標題</h1>
        </header>
        
        <ul id="messages"></ul>
        
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="輸入匿名訊息..." required />
            <button type="submit">發送</button>
        </form>
    </div>

    <!-- 引入 Socket.io 客戶端套件 -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
